name: Ozon BM — Debug Returns

on:
  workflow_dispatch:

jobs:
  debug-returns:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run debug
        env:
          OZON_BM_CLIENT_ID: ${{ secrets.OZON_BM_CLIENT_ID }}
          OZON_BM_API_KEY: ${{ secrets.OZON_BM_API_KEY }}
        run: python ozon/debug_returns.py
