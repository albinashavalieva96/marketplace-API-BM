name: Ozon CF — История заказов (только вручную)

on:
  workflow_dispatch:

jobs:
  load-history-cf:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run CF history script
        env:
          OZON_CF_CLIENT_ID: ${{ secrets.OZON_CF_CLIENT_ID }}
          OZON_CF_API_KEY: ${{ secrets.OZON_CF_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ozon/load_history_cf.py
