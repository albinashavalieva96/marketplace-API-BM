name: Ozon BM — Возвраты

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-ozon-bm-returns:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run Ozon BM returns script
        env:
          OZON_BM_CLIENT_ID: ${{ secrets.OZON_BM_CLIENT_ID }}
          OZON_BM_API_KEY: ${{ secrets.OZON_BM_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ozon/returns_bm.py
