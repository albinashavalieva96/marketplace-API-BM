name: WB Бар — Возвраты

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:

jobs:
  update-wb-bar-returns:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run WB Бар returns script
        env:
          WB_BAR_API_KEY: ${{ secrets.WB_BAR_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python wb/returns_bar.py
