name: Ozon CF — Заказы FBS и FBO

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-cf-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run CF orders script
        env:
          OZON_CF_CLIENT_ID: ${{ secrets.OZON_CF_CLIENT_ID }}
          OZON_CF_API_KEY: ${{ secrets.OZON_CF_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ozon/orders_cf.py
