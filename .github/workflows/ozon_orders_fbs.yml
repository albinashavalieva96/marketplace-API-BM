name: Ozon BM — Заказы FBS и FBO

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-fbs-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FBS orders script
        env:
          OZON_BM_CLIENT_ID: ${{ secrets.OZON_BM_CLIENT_ID }}
          OZON_BM_API_KEY: ${{ secrets.OZON_BM_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ozon/orders_fbs.py
