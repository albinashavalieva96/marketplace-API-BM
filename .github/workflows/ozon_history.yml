name: Ozon BM — История заказов (только вручную)

on:
  workflow_dispatch:

jobs:
  load-history:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run history script
        env:
          OZON_BM_CLIENT_ID: ${{ secrets.OZON_BM_CLIENT_ID }}
          OZON_BM_API_KEY: ${{ secrets.OZON_BM_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python ozon/load_history.py
