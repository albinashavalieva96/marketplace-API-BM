name: WB Виз — История заказов (только вручную)

on:
  workflow_dispatch:

jobs:
  load-wb-viz-history:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run WB Виз history script
        env:
          WB_VIZ_API_KEY: ${{ secrets.WB_VIZ_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python wb/load_history_viz.py
